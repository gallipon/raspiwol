<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>desktopmuk リモコン</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 24px;
    font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", sans-serif;
    background: #15171c; color: #e8eaed; padding: 24px;
  }
  h1 { font-size: 18px; font-weight: 600; margin: 0; color: #9aa0a6; }
  .status {
    display: flex; align-items: center; gap: 12px;
    font-size: 22px; font-weight: 600;
  }
  .dot {
    width: 18px; height: 18px; border-radius: 50%;
    background: #5f6368; box-shadow: 0 0 0 0 rgba(0,0,0,0);
    transition: background .3s, box-shadow .3s;
  }
  .dot.up   { background: #34a853; box-shadow: 0 0 12px 2px rgba(52,168,83,.6); }
  .dot.down { background: #ea4335; }
  .dot.wait { background: #fbbc04; }
  .buttons { display: flex; gap: 16px; }
  button {
    appearance: none; border: none; border-radius: 16px;
    padding: 22px 28px; min-width: 130px;
    font-size: 18px; font-weight: 700; color: #fff;
    cursor: pointer; transition: transform .05s, opacity .2s;
  }
  button:active { transform: scale(.96); }
  button:disabled { opacity: .4; cursor: default; }
  .wake  { background: #1a73e8; }
  .sleep { background: #5f6368; }
  .meta { font-size: 12px; color: #80868b; text-align: center; line-height: 1.6; }
  #log {
    width: 100%; max-width: 380px; height: 96px; overflow-y: auto;
    background: #0e1014; border-radius: 10px; padding: 10px 12px;
    font: 12px/1.5 ui-monospace, Menlo, Consolas, monospace; color: #9aa0a6;
    white-space: pre-wrap;
  }
</style>
</head>
<body>
  <h1>desktopmuk リモコン</h1>

  <div class="status">
    <span id="dot" class="dot wait"></span>
    <span id="label">確認中…</span>
  </div>

  <div class="buttons">
    <button id="wake"  class="wake">Wake</button>
    <button id="sleep" class="sleep">Sleep</button>
  </div>

  <div class="meta">
    <span id="conn">接続中…</span><br>
    target <span id="ip"></span>
  </div>

  <div id="log"></div>

<script src="https://beebotte.com/bbt.min.js"></script>
<script>
// ── 設定 ───────────────────────────────────────────────────────────────────
var CHANNEL   = "raspi3b";
var CMD_RES   = "wol";          // コマンド送信先リソース（raspi3b/wol）
var LOG_RES   = "log";          // ステータス受信リソース（raspi3b/log）
var TARGET_IP = "192.168.11.49"; // 会社 desktopmuk の固定 IP（ping 対象）
var WAKE_CMD  = "desktopmuk";   // WOL マジックパケット送信
var SLEEP_CMD = "pwrbtn";       // GPIO 電源ボタン短押し（Windows 側で「電源ボタン=スリープ」設定が前提）
var POLL_MS   = 8000;           // ステータス自動更新間隔

// トークンは URL ハッシュで渡す:  dashboard.html#token_XXXXXXXX
var TOKEN = decodeURIComponent((location.hash || "").replace(/^#/, "").trim());

// ── DOM ────────────────────────────────────────────────────────────────────
var dot   = document.getElementById("dot");
var label = document.getElementById("label");
var conn  = document.getElementById("conn");
var wakeB = document.getElementById("wake");
var sleepB= document.getElementById("sleep");
document.getElementById("ip").textContent = TARGET_IP;

function logLine(s) {
  var el = document.getElementById("log");
  var t = new Date().toLocaleTimeString();
  el.textContent += "[" + t + "] " + s + "\n";
  el.scrollTop = el.scrollHeight;
}

function setStatus(state, text) {
  dot.className = "dot " + state;   // up / down / wait
  label.textContent = text;
}

if (!TOKEN) {
  setStatus("down", "トークン未設定");
  conn.textContent = "URL の末尾に #token_XXXX を付けて開いてください";
  wakeB.disabled = sleepB.disabled = true;
  throw new Error("no token");
}

// ── Beebotte 接続 ───────────────────────────────────────────────────────────
var bbt = new BBT(TOKEN, { ssl: true });

// Beebotte のメッセージは {data: ...} で包まれる場合があるので剥がす
function unwrap(msg) {
  var d = msg;
  for (var i = 0; i < 2; i++) {
    if (d && typeof d === "object" && "data" in d) d = d.data; else break;
  }
  return d;
}

bbt.subscribe({ channel: CHANNEL, resource: LOG_RES }, function (msg) {
  var d = unwrap(msg);
  if (typeof d !== "string") return;
  logLine(d);
  // "ping: 192.168.11.49 up" / "... down" を拾ってステータス更新
  var m = d.match(/^ping:\s*(\S+)\s+(up|down)$/);
  if (m && m[1] === TARGET_IP) {
    if (m[2] === "up") setStatus("up", "ON");
    else               setStatus("down", "OFF");
  }
});

conn.textContent = "接続済み";

function publish(cmd) {
  bbt.publish({ channel: CHANNEL, resource: CMD_RES, data: cmd });
  logLine("→ " + cmd);
}

// ── ステータス自動ポーリング ────────────────────────────────────────────────
function poll() { publish("ping " + TARGET_IP); }
poll();
setInterval(poll, POLL_MS);

// ── ボタン ──────────────────────────────────────────────────────────────────
wakeB.addEventListener("click", function () {
  publish(WAKE_CMD);
  setStatus("wait", "起動中…");
});

sleepB.addEventListener("click", function () {
  if (!confirm("desktopmuk をスリープさせますか？")) return;
  publish(SLEEP_CMD);
  setStatus("wait", "スリープ中…");
});
</script>
</body>
</html>
